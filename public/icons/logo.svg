<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Shine -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Kubernetes-style hexagonal wheel (left portion) -->
  <polygon points="52,26 74,26 85,46 74,66 52,66 41,46" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/>
  <!-- Inner hexagon -->
  <polygon points="56,34 70,34 77,46 70,58 56,58 49,46" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="63" cy="46" r="4" fill="white"/>
  <!-- Spokes from center to vertices -->
  <line x1="63" y1="42" x2="63" y2="26" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="66.5" y1="48" x2="85" y2="46" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="66.5" y1="44" x2="74" y2="26" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="59.5" y1="44" x2="52" y2="26" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="59.5" y1="48" x2="41" y2="46" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="63" y1="50" x2="63" y2="66" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- Signal/pulse wave (right and bottom portion) -->
  <polyline points="30,88 42,88 48,72 54,100 60,78 66,94 72,84 78,88 98,88" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Signal dots -->
  <circle cx="30" cy="88" r="3" fill="white" opacity="0.5"/>
  <circle cx="98" cy="88" r="3" fill="white"/>
  <!-- Small radiating arcs from the right dot -->
  <path d="M102 82 Q108 88 102 94" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M106 78 Q114 88 106 98" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</svg>
